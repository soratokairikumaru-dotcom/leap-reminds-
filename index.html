<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEAP管理</title>

<link rel="manifest" href="manifest.json">

<style>
body { font-family: sans-serif; margin: 10px; }
h1 { text-align: center; }

.section {
  margin-bottom: 20px;
  padding: 10px;
  border-radius: 10px;
}

.word {
  display: inline-block;
  width: 60px;
  margin: 3px;
}

button {
  width: 40px;
  height: 30px;
}

.progress {
  text-align: center;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>LEAP進捗</h1>
<div class="progress" id="progress"></div>

<div id="weak"></div>
<div id="container"></div>

<script>
const total = 2300;
const sectionSize = 200;

let data = JSON.parse(localStorage.getItem("leap")) || [];

// ===== 今日のセクション =====
const today = new Date().toDateString();
let currentSection = localStorage.getItem("currentSection");
let lastDate = localStorage.getItem("lastDate");

if (currentSection === null) currentSection = 0;

if (lastDate !== today) {
  currentSection = parseInt(currentSection) + 1;
  if (currentSection >= 12) currentSection = 0;

  localStorage.setItem("currentSection", currentSection);
  localStorage.setItem("lastDate", today);
} else {
  currentSection = parseInt(currentSection);
}

const start = currentSection * 200 + 1;
const end = Math.min(start + 199, total);

// 表示
document.body.insertAdjacentHTML("afterbegin",
  `<h2 style="text-align:center; color:red;">
    🔥今日は ${start}〜${end} やれ
  </h2>`
);

// ===== 進捗 =====
function updateProgress() {
  let perfect = data.filter(x => x === 2).length;
  let percent = ((perfect / total) * 100).toFixed(1);

  document.getElementById("progress").textContent =
    `◎ ${perfect} / ${total} (${percent}%)`;
}

// ===== 3段階ボタン =====
function updateButton(btn, state) {
  if (state === 0) {
    btn.textContent = "❌";
    btn.style.background = "#eee";
  } else if (state === 1) {
    btn.textContent = "△";
    btn.style.background = "#ffd966";
  } else {
    btn.textContent = "◎";
    btn.style.background = "#8fd18f";
  }
}

// ===== 達成率 =====
function getSectionProgress(start, end) {
  let totalCount = end - start + 1;
  let perfect = 0;

  for (let i = start; i <= end; i++) {
    if (data[i] === 2) perfect++;
  }

  return Math.floor((perfect / totalCount) * 100);
}

// ===== UI生成 =====
const container = document.getElementById("container");

function showSection(index) {
  container.innerHTML = "";

  let s = index * sectionSize;
  let end = Math.min(s + sectionSize, total);

  const section = document.createElement("div");
  section.className = "section";

  const percent = getSectionProgress(s+1, end);

  // 色分け
  if (percent >= 80) section.style.background = "#c8f7c5";
  else if (percent >= 50) section.style.background = "#fff3b0";
  else section.style.background = "#f7c5c5";

  const title = document.createElement("h3");
  title.textContent = `${s+1}〜${end}`;
  section.appendChild(title);

  const progressText = document.createElement("p");
  progressText.textContent = `達成率：${percent}%`;
  section.appendChild(progressText);

  for (let i = s+1; i <= end; i++) {
    const label = document.createElement("label");
    label.className = "word";

    const btn = document.createElement("button");

    let state = data[i] || 0;
    updateButton(btn, state);

    btn.onclick = () => {
      state = (state + 1) % 3;
      data[i] = state;
      localStorage.setItem("leap", JSON.stringify(data));
      updateButton(btn, state);
      updateProgress();
    };

    label.appendChild(btn);
    label.appendChild(document.createTextNode(i));

    section.appendChild(label);
  }

  container.appendChild(section);
}

// ===== 苦手セクション =====
function getWeakSections() {
  let sections = [];

  for (let s = 0; s < total; s += sectionSize) {
    let end = Math.min(s + sectionSize, total);
    let percent = getSectionProgress(s+1, end);

    sections.push({
      index: s / sectionSize,
      percent: percent,
      start: s+1,
      end: end
    });
  }

  sections.sort((a, b) => a.percent - b.percent);
  return sections;
}

const weakDiv = document.getElementById("weak");
weakDiv.innerHTML = "<h2>⚠️ 苦手セクション</h2>";

getWeakSections().slice(0,3).forEach(sec => {
  let btn = document.createElement("button");

  btn.textContent = `${sec.start}〜${sec.end}（${sec.percent}%）`;

  btn.onclick = () => showSection(sec.index);

  weakDiv.appendChild(btn);
});

// 初期表示
showSection(currentSection);
updateProgress();

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
